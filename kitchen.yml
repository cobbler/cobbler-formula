# -*- coding: utf-8 -*-
# vim: ft=yaml
---
# For help on this file's format, see https://kitchen.ci/
driver:
  name: docker
  use_sudo: false
  privileged: true
  run_command: /usr/lib/systemd/systemd

transport:
  # Default is 600s (10 minutes): too long to sit on a CI job that's stuck
  # retrying a connection that will never succeed (e.g. SSH being rejected
  # outright rather than merely slow to come up). Fail fast instead.
  max_wait_until_ready: 180

provisioner:
  name: salt_solo
  log_level: debug
  salt_install: none
  require_chef: false
  formula: cobbler
  dependencies:
    - name: epel
      repo: git
      source: https://github.com/saltstack-formulas/epel-formula.git
  salt_copy_filter:
    - .kitchen
    - .git
  pillars_from_directories:
    - test/salt/pillar

platforms:

  ## SALT `master`
  - name: debian-12-master
    driver:
      image: saltimages/salt-master-py3:debian-12
      run_command: /lib/systemd/systemd
  - name: debian-11-master
    driver:
      image: saltimages/salt-master-py3:debian-11
      run_command: /lib/systemd/systemd
  - name: ubuntu-2404-master
    driver:
      image: saltimages/salt-master-py3:ubuntu-24.04
      run_command: /lib/systemd/systemd
  - name: ubuntu-2204-master
    driver:
      image: saltimages/salt-master-py3:ubuntu-22.04
      run_command: /lib/systemd/systemd
  - name: ubuntu-2004-master
    driver:
      image: saltimages/salt-master-py3:ubuntu-20.04
      run_command: /lib/systemd/systemd
  - name: centos-stream9-master
    driver:
      image: saltimages/salt-master-py3:centos-stream9
      # Workaround: on GitHub Actions runners, sshd's PAM account phase
      # rejects every login with PAM_AUTHINFO_UNAVAIL because the
      # setuid-root `unix_chkpwd` helper (which `pam_unix.so` shells out
      # to) can't read /etc/shadow there, even though root itself can
      # read it fine via `docker exec`. This matches a known Moby/Docker
      # container-runtime issue, not anything wrong with the image/PAM
      # config: https://github.com/moby/moby/issues/48734. Make the file
      # world-readable before systemd starts sshd to route around it.
      # Affects every RPM-based platform below.
      # yamllint disable-line rule:line-length
      run_command: bash -c "chmod +r /etc/shadow; exec /usr/lib/systemd/systemd"
  - name: fedora-40-master
    driver:
      image: saltimages/salt-master-py3:fedora-40
      # Workaround: see the centos-stream9-master entry above.
      # yamllint disable-line rule:line-length
      run_command: bash -c "chmod +r /etc/shadow; exec /usr/lib/systemd/systemd"
  - name: opensuse-leap-155-master
    driver:
      image: saltimages/salt-master-py3:opensuse-leap-15.5
    # Workaround to avoid intermittent failures on `opensuse-leap-15.5`:
    # => SCP did not finish successfully (255):  (Net::SCP::Error)
    transport:
      max_ssh_sessions: 1
  - name: opensuse-tmbl-latest-master
    driver:
      image: saltimages/salt-master-py3:opensuse-tumbleweed-latest
    # Workaround to avoid intermittent failures on `opensuse-tumbleweed`:
    # => SCP did not finish successfully (255):  (Net::SCP::Error)
    transport:
      max_ssh_sessions: 1
    # Workaround for the `salt-master-py3:opensuse-tumbleweed-latest` image lagging
    # behind the current Tumbleweed snapshot: this causes partial-upgrade dependency
    # conflicts (e.g. `cobbler` requiring a `fence-agents` build that the stale
    # `perl-Error` can't satisfy). Sync to the current snapshot before Salt installs
    # packages. The current snapshot's /etc/os-release comments out `VERSION=` (only
    # `VERSION_ID=` is active), which breaks this project's pinned InSpec/Train fork's
    # SUSE detection (it reads `VERSION`, not `VERSION_ID`) and crashes
    # `bin/kitchen verify`; restore an uncommented `VERSION=` line so InSpec can still
    # detect the platform.
    lifecycle:
      pre_converge:
        - remote: >-
            sudo sh -c "zypper --non-interactive ref && zypper --non-interactive dup &&
            (grep -q '^VERSION=' /etc/os-release || sed -i 's/^# VERSION=/VERSION=/'
            /etc/os-release)"
  - name: amazonlinux-2023-master
    driver:
      image: saltimages/salt-master-py3:amazonlinux-2023
      # Workaround: see the centos-stream9-master entry above.
      # yamllint disable-line rule:line-length
      run_command: bash -c "chmod +r /etc/shadow; exec /usr/lib/systemd/systemd"
  - name: oraclelinux-9-master
    driver:
      image: saltimages/salt-master-py3:oraclelinux-9
      # Workaround: see the centos-stream9-master entry above.
      # yamllint disable-line rule:line-length
      run_command: bash -c "chmod +r /etc/shadow; exec /usr/lib/systemd/systemd"
  - name: oraclelinux-8-master
    driver:
      image: saltimages/salt-master-py3:oraclelinux-8
      # Workaround: see the centos-stream9-master entry above.
      # yamllint disable-line rule:line-length
      run_command: bash -c "chmod +r /etc/shadow; exec /usr/lib/systemd/systemd"
  - name: almalinux-9-master
    driver:
      image: saltimages/salt-master-py3:almalinux-9
      # Workaround: see the centos-stream9-master entry above.
      # yamllint disable-line rule:line-length
      run_command: bash -c "chmod +r /etc/shadow; exec /usr/lib/systemd/systemd"
  - name: almalinux-8-master
    driver:
      image: saltimages/salt-master-py3:almalinux-8
      # Workaround: see the centos-stream9-master entry above.
      # yamllint disable-line rule:line-length
      run_command: bash -c "chmod +r /etc/shadow; exec /usr/lib/systemd/systemd"
  - name: rockylinux-9-master
    driver:
      image: saltimages/salt-master-py3:rockylinux-9
      # Workaround: see the centos-stream9-master entry above.
      # yamllint disable-line rule:line-length
      run_command: bash -c "chmod +r /etc/shadow; exec /usr/lib/systemd/systemd"
  - name: rockylinux-8-master
    driver:
      image: saltimages/salt-master-py3:rockylinux-8
      # Workaround: see the centos-stream9-master entry above.
      # yamllint disable-line rule:line-length
      run_command: bash -c "chmod +r /etc/shadow; exec /usr/lib/systemd/systemd"

verifier:
  # https://www.inspec.io/
  name: inspec
  sudo: true
  reporter:
    # cli, documentation, html, progress, json, json-min, json-rspec, junit
    - cli

suites:
  - name: default
    provisioner:
      state_top:
        base:
          '*':
            - cobbler._mapdata
            - cobbler
    verifier:
      inspec_tests:
        - path: test/integration/default
