# -*- coding: utf-8 -*-
# vim: ft=yaml
---
name: Test
on:  # yamllint disable-line rule:truthy
  pull_request: null
  push:
    branches:
      - main

jobs:
  kitchen:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kitchen-suite:
          - default
        salt-version:
          # See kitchen.yml --> platforms[].name
          - master
        os-version:
          # See kitchen.yml --> platforms[].name
          # Not all OSes are available for all versions
          - opensuse-tmbl-latest
          - opensuse-leap-155
          - debian-12
          # - debian-11
          - ubuntu-2404
          # - ubuntu-2204
          # - ubuntu-2004
          # RPM-based platforms reject every SSH login on this runner with
          # PAM_AUTHINFO_UNAVAIL (pam_unix's account check can't retrieve
          # shadow info via unix_chkpwd), but work fine locally with the
          # identical image/config - a GitHub Actions runner environment
          # issue, not a formula bug; see
          # https://github.com/cobbler/cobbler-formula/issues/17
          # Re-enabled to test whether making /etc/shadow world-readable
          # unblocks unix_chkpwd on the runner.
          - centos-stream9
          - fedora-40
          - almalinux-9
          # - almalinux-8
          - rockylinux-9
          # - rockylinux-8
          # - amazonlinux-2023
          # - oraclelinux-9
          # - oraclelinux-8
    steps:
      - name: Checkout repository
        # https://github.com/actions/checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Set up Ruby
        # https://github.com/ruby/setup-ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600  # v1.319.0
        with:
          ruby-version: 3.1
          # runs 'bundle install' and caches installed gems automatically:
          bundler-cache: true
      # yamllint disable rule:line-length
      - run: bin/kitchen verify ${{ matrix.kitchen-suite }}-${{ matrix.os-version }}-${{ matrix.salt-version }}
      # yamllint enable rule:line-length
